<!--перенос ссылок профиля к профилю для мобилки -->
<script>
function moveEmailLinksMobile() {
    if (window.matchMedia('(max-width: 540px)').matches) {
        // Находим все .pl-email внутри .post-links
        $('.post-links .pl-email').each(function() {
            const $emailLink = $(this);
            const $postAuthor = $emailLink.closest('.post').find('.post-author');
            
            // Создаем контейнер если его нет
            if ($postAuthor.find('.mobile-email-links').length === 0) {
                $postAuthor.append('<div class="mobile-email-links"></div>');
            }
            
            // Перемещаем элемент
            $postAuthor.find('.mobile-email-links').append($emailLink);
        });
    }
}

// Запускаем при загрузке и изменении размера окна
$(document).ready(function() {
    moveEmailLinksMobile();
    $(window).on('resize', moveEmailLinksMobile);
});
</script>

<div id="float" style="display:none;">
  <strong>Направление обтекания</strong>
  <div>
  <span class="vibor float-left-btn" title="Слева" onclick="bbcode('[float=left]', '[/float]')">
    <span class="material-symbols-rounded">format_image_left</span>
  </span>
  <span class="vibor float-right-btn" title="Справа" onclick="bbcode('[float=right]', '[/float]')">
    <span class="material-symbols-rounded">format_image_right</span>
  </span>
  </div>
</div>

<script>
$(function () {
  // Добавляем кнопку "Обтекание" перед "Ссылка"
  $('td#button-link').before(
    '<td id="button-float" class="button-float-custom" title="Обтекание">' +
      
    '</td>'
  );

  $('#button-float, .vibor').on('click', function () {
    $('#float').toggle();
  });

  const elm = document.getElementsByTagName("div");
  for (let x = 0; x < elm.length; x++) {
    if (elm[x].className === "post-content") {
      let post = elm[x].innerHTML;
      if (post.indexOf("[/float]") !== -1) {
        const floats = /\[float=(.*?)\]([^\[]{1,11000})\[\/float\]/gi;
        elm[x].innerHTML = post.replace(
          floats,
          "<span style='float: $1; margin: 15px; text-align: $1;'>$2</span>"
        );
      }
    }
  }

  $('#float').insertBefore('#button-link');
});
</script>
