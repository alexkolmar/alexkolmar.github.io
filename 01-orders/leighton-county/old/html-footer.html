 });

   else $("#ToTop").addClass("slow")
  });

   if ($(window).scrollTop() >= $(document).height() - "999") $("#OnBottom").removeClass("slow")
   else $("#OnBottom").addClass("slow")
  });
  $("#ToTop").click(function () { $("html,body").animate({ scrollTop: 0 }, "slow") })

 });
